server:
  port: ${PORT:9090}

spring:
  profiles:
    active: ${SPRING_ACTIVE_PROFILES:preprod,h2}
  main:
    banner-mode: off
  flyway:
    out-of-order: true
    locations:
      - classpath:db/store/{vendor}
      - classpath:db/migration/h2/uverify
  datasource:
    url: ${DB_URL:jdbc:h2:./data/db}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}

springdoc:
  writer-with-default-pretty-printer: true
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

apiPrefix: /api/v1

logging:
  level:
    root: ${LOG_LEVEL:INFO}
  file:
    name: ${LOG_FILE:}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

store:
  sync-auto-start: ${YACI_STORE_AUTO_START:true}
  cardano:
    host: ${REMOTE_NODE_URL:backbone.mainnet.cardanofoundation.org}
    port: ${REMOTE_NODE_PORT:3001}
    protocol-magic: 764824073
    sync-start-slot: 153422988
    sync-start-blockhash: c6b1c0eebd697a25bbcc429f4d66258b83db07ad060b13065612e50410bda7b2
    sync-auto-start: ${YACI_STORE_AUTO_START:true}
  blocks:
    enabled: false
  assets:
    enabled: false
  metadata:
    enabled: false
  mir:
    enabled: false
  script:
    enabled: true
  epoch:
    enabled: false
  staking:
    enabled: false
  transaction:
    enabled: true
    api-enabled: false
    save-witness: false
  utxo:
    api-enabled: false
    enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

cardano:
  network: ${CARDANO_NETWORK:preprod}
  facilitator:
    user:
      mnemonic: ${FACILITATOR_ACCOUNT_MNEMONIC:}
  test:
    user:
      mnemonic: ${TEST_USER_MNEMONIC:}
  service:
    user:
      mnemonic: ${SERVICE_ACCOUNT_MNEMONIC:}
      address: ${SERVICE_USER_ADDRESS:addr1qxqup4lcghajeawjx3faccuewk2k3ztneps8segrcn28ky223ul5q54jq72wps946c5gw8z5mfjhqa9r8znzk4vd4sls8jqsva}
    fee:
      receiver:
        mnemonic: ${FEE_RECEIVER_MNEMONIC:}
      partner:
        address: ${FEE_RECEIVER_PARTNER_ADDRESS:}
  backend:
    service:
      type: ${CARDANO_BACKEND_TYPE:blockfrost}
    blockfrost:
      projectId: ${BLOCKFROST_PROJECT_ID}
      baseUrl: ${BLOCKFROST_BASE_URL}

extensions:
  connected-goods:
    encryption:
      salt: ${CONNECTED_GOODS_ENCRYPTION_SALT}
    enabled: ${CONNECTED_GOODS_EXTENSION_ENABLED:true}
    service-wallet:
      mnemonic: ${CONNECTED_GOODS_SERVICE_WALLET_MNEMONIC:}
      address: ${CONNECTED_GOODS_SERVICE_WALLET_ADDRESS}
  tadamon:
    enabled: ${TADAMON_EXTENSION_ENABLED:false}
    allowed-addresses: ${TADAMON_ALLOWED_ADDRESSES:}
    google:
      sheets:
        id: ${TADAMON_GOOGLE_SHEETS_ID:}
        private-key: ${TADAMON_GOOGLE_SHEETS_PRIVATE_KEY:}
        service-account: ${TADAMON_GOOGLE_SHEETS_SERVICE_ACCOUNT:}

faucet:
  enabled: ${FAUCET_ENABLED:false}
  mnemonic: ${FAUCET_MNEMONIC:}
  utxo-count: ${FAUCET_UTXO_COUNT:3}
  utxo-amount-lovelace: ${FAUCET_UTXO_AMOUNT_LOVELACE:10000000}
  cooldown-ms: ${FAUCET_COOLDOWN_MS:120000}

proxy:
  transaction-hash: ${PROXY_TX_HASH:e87045afe5247ef3912b37be23ba7b0df193849f463ad4ddd89216c512613af2}
  output-index: ${PROXY_OUTPUT_INDEX:1}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    driverClassName: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uverify}
  flyway:
    locations:
      - classpath:db/store/{vendor}
      - classpath:db/migration/postgres/uverify
---
spring:
  config:
    activate:
      on-profile: h2
  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
  flyway:
    locations:
      - classpath:db/store/{vendor}
      - classpath:db/migration/h2/uverify
  h2:
    console:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:h2:mem:uverify}
---
spring:
  config:
    activate:
      on-profile: preprod
store:
  sync-auto-start: ${YACI_STORE_AUTO_START:true}
  cardano:
    host: ${REMOTE_NODE_URL:preprod-node.world.dev.cardano.org}
    port: ${REMOTE_NODE_PORT:30000}
    protocol-magic: ${PROTOCOL_MAGIC:1}
    sync-start-slot: 80086574
    sync-start-blockhash: 4f9308fcc35bc2fffc399171dc36d3730bcd4f4e9349dd59362f1fdb8604fde8
    sync-auto-start: ${YACI_STORE_AUTO_START:true}
proxy:
  transaction-hash: ${PROXY_TX_HASH:ab9ef12a53209db854dddd415d6404cb8323bf9d05bfb174334de150275d4986}
  output-index: ${PROXY_OUTPUT_INDEX:1}
cardano:
  service:
    user:
      address: ${SERVICE_USER_ADDRESS:addr_test1qqgmew8y57fsfc3me40zha3gjplehxv0gwgz7sw3mdpenqgs8flgvgd7y0mwwkk5p96a8hfdptxrawepr2evqhl2aj3sr9vgye}
---